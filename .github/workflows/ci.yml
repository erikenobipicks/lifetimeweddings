name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      # Fail the build on HIGH/CRITICAL advisories, EXCEPT the framework-level
      # ones allowlisted in audit-ci.jsonc (Astro 6 / sharp — only fixable by
      # the breaking Astro 7 upgrade, tracked separately; verified
      # non-exploitable here). `npm audit` has no per-advisory allowlist, so we
      # use audit-ci. Remove the allowlist after the Astro 7 upgrade.
      - run: npx --yes audit-ci@^7 --config ./audit-ci.jsonc
