name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      - run: npm ci
      # Fail the build on HIGH/CRITICAL advisories, EXCEPT the framework-level
      # ones allowlisted in scripts/audit-check.mjs (Astro 6 / sharp — only
      # fixable by the breaking Astro 7 upgrade, tracked separately; verified
      # non-exploitable here). Self-contained node script over `npm audit
      # --json` (no per-run download, unlike audit-ci which broke). Remove the
      # allowlisted ids after the Astro 7 upgrade.
      - run: node scripts/audit-check.mjs
